<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#0e0e0e"/>
  <!-- Subtle corner structural lines — matches portfolio design language -->
  <line x1="2" y1="2"  x2="7"  y2="2"  stroke="#4e453b" stroke-width="1"/>
  <line x1="2" y1="2"  x2="2"  y2="7"  stroke="#4e453b" stroke-width="1"/>
  <line x1="30" y1="30" x2="25" y2="30" stroke="#4e453b" stroke-width="1"/>
  <line x1="30" y1="30" x2="30" y2="25" stroke="#4e453b" stroke-width="1"/>
  <!-- Italic C — EB Garamond with Georgia/serif fallback -->
  <text
    x="17"
    y="23"
    text-anchor="middle"
    font-family="'EB Garamond', 'Lora', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="300"
    font-size="22"
    fill="#e5c497"
  >C</text>
</svg>